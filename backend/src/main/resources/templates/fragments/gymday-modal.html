<div th:fragment="gymDayModal">
    <div class="modal fade" id="gymDayModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">Log Workout</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form th:action="@{/gymdays/save}" method="post">
                        <input type="hidden" id="gymDayId" name="id">

                        <div class="mb-3">
                            <label for="gymDayDate" class="form-label fw-bold">Workout Date</label>
                            <input type="date" class="form-control" id="gymDayDate" name="date" required>
                            <div class="form-text">When did you hit the gym?</div>
                        </div>

                        <div class="mb-3">
                            <label for="gymDayName" class="form-label fw-bold">Workout Name</label>
                            <input type="text" class="form-control" id="gymDayName" name="name" placeholder="e.g. Leg Day, Push Workout" required>
                        </div>

                        <!-- We'll automatically assign the mock user in the controller or service if not provided -->
                        <div class="modal-footer px-0 pb-0 pt-3 border-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4">Save Workout</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
