<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gym Buddy - Edit Workout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Gym Buddy</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/gymdays">Back to Workouts</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h3 class="mb-0">Edit Workout Log</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/gymdays/save}" method="post">
                        <input type="hidden" name="id" th:value="${gymDay.id}" />

                        <div class="mb-3">
                            <label for="gymDayDate" class="form-label fw-bold">Workout Date</label>
                            <input type="date" class="form-control" id="gymDayDate" name="date" th:value="${gymDay.date}" required>
                        </div>

                        <div class="mb-3">
                            <label for="gymDayName" class="form-label fw-bold">Workout Name</label>
                            <input type="text" class="form-control" id="gymDayName" name="name" th:value="${gymDay.name}" required />
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="/gymdays" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
