spring.application.name=gym-service
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gymbuddy_db
spring.datasource.username=gymuser
spring.datasource.password=gympassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Body Fat Service
bodyfat.service.url=http://localhost:8000

